services:

  # ── PostgreSQL ────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: bank_marketing_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: bank_marketing
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Initialise both app DB and MLflow DB on first start
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app_network

  # ── MLflow tracking server ────────────────────────────────────────────────────
  # Uses a pre-built image (docker/mlflow/Dockerfile) so all pip installs happen
  # at `docker compose build` time, not on every startup. This avoids the
  # healthcheck timing out on fresh machines while packages download.
  mlflow:
    build:
      context: ./docker/mlflow
      dockerfile: Dockerfile
    image: bank_marketing_mlflow:latest
    container_name: bank_marketing_mlflow
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - mlflow_artifacts:/mlflow/artifacts
    ports:
      - "5000:5000"
    # List form avoids shell quoting issues.
    # --disable-security-middleware is safe inside Docker.
    command:
      - mlflow
      - server
      - --backend-store-uri
      - postgresql://mlflow:mlflow@postgres:5432/mlflow
      - --default-artifact-root
      - /mlflow/artifacts
      - --host
      - "0.0.0.0"
      - --port
      - "5000"
      - --disable-security-middleware
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 120s
    networks:
      - app_network

  # ── pgAdmin (DB browser) ──────────────────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: bank_marketing_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@bankmarketing.local
      PGADMIN_DEFAULT_PASSWORD: admin
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - app_network
    profiles:
      - tools  # start with: docker compose --profile tools up

  # ── ML pipeline (run once; not a long-lived service) ─────────────────────────
  pipeline:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bank_marketing_pipeline
    depends_on:
      postgres:
        condition: service_healthy
      mlflow:
        condition: service_healthy
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      MLFLOW_TRACKING_URI: http://mlflow:5000
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./reports:/app/reports
    command: ["python", "-m", "scripts.run_pipeline", "--all"]
    networks:
      - app_network
    profiles:
      - pipeline  # start with: docker compose --profile pipeline up

volumes:
  postgres_data:
  mlflow_artifacts:
  pgadmin_data:

networks:
  app_network:
    driver: bridge
